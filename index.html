<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Visualizer</h1>
            <button id="themeToggle" class="btn-icon">🌙 Dark Mode</button>
        </header>

        <section class="card summary-card">
            <div class="budget-setup">
                <label for="budgetLimit">Set Budget Bulanan:</label>
                <input type="number" id="budgetLimit" placeholder="Contoh: 500000">
                <button id="saveBudgetBtn">Simpan</button>
            </div>
            <div class="balance-info">
                <h2>Total Pengeluaran</h2>
                <h3 id="totalExpenses">Rp 0</h3>
                <p id="budgetStatus" class="status-text">Budget belum diatur.</p>
            </div>
        </section>

        <section class="card chart-card">
            <h3>Pengeluaran per Kategori</h3>
            <div id="chartContainer" class="chart-container">
                </div>
        </section>

        <section class="card">
            <h3>Tambah Pengeluaran</h3>
            <form id="transactionForm">
                <input type="text" id="descInput" placeholder="Deskripsi (Misal: Makan Siang)" required>
                <input type="number" id="amountInput" placeholder="Jumlah (Misal: 25000)" required>
                <select id="categoryInput" required>
                    <option value="" disabled selected>Pilih Kategori</option>
                    <option value="Makanan">Makanan</option>
                    <option value="Transportasi">Transportasi</option>
                    <option value="Hiburan">Hiburan</option>
                    <option value="Tagihan">Tagihan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
                <button type="submit" class="btn-primary">Tambah</button>
            </form>
        </section>

        <section class="card">
            <div class="history-header">
                <h3>Riwayat Transaksi</h3>
                <select id="sortInput">
                    <option value="newest">Terbaru</option>
                    <option value="amountHigh">Nominal Tertinggi</option>
                    <option value="amountLow">Nominal Terendah</option>
                    <option value="category">Kategori (A-Z)</option>
                </select>
            </div>
            <ul id="transactionList" class="transaction-list">
                </ul>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
